name: tamerclaw_mobile
description: TamerClaw - Multi-Agent AI Management System
publish_to: 'none'
version: 11.1.0+12

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0
  # Biometric auth
  local_auth: ^2.3.0
  # Chat attachments
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  path: ^1.8.3
  mime: ^1.0.5
  # Voice notes
  record: ^5.0.5
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  # Image sharing & saving
  share_plus: ^7.2.2
  gal: ^2.3.0
  dio: ^5.4.0
  # Push notifications (local)
  flutter_local_notifications: ^17.2.1
  # Background task scheduling
  workmanager: ^0.5.2

dependency_overrides:
  # record_linux 0.7.2 is incompatible with record_platform_interface 1.5.0
  # Pin to an older interface version until record_linux catches up.
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
